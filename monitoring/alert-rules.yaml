apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: microservices-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: pod-health
    interval: 30s
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="microservices"}[15m]) > 0.05
      for: 5m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Restarted more than 3 times in 15 minutes."
    - alert: PodNotReady
      expr: kube_pod_status_ready{namespace="microservices", condition="true"} == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
    - alert: HighMemoryUsage
      expr: |
        (container_memory_working_set_bytes{namespace="microservices"} /
        container_spec_memory_limit_bytes{namespace="microservices"}) > 0.85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} memory above 85%"
    - alert: HighCPUUsage
      expr: |
        (rate(container_cpu_usage_seconds_total{namespace="microservices"}[5m]) /
        container_spec_cpu_quota{namespace="microservices"} *
        container_spec_cpu_period{namespace="microservices"}) > 0.80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.container }} CPU above 80%"
  - name: slo-alerts
    rules:
    - alert: HighErrorRate
      expr: |
        sum(rate(http_requests_total{namespace="microservices", status=~"5.."}[5m])) /
        sum(rate(http_requests_total{namespace="microservices"}[5m])) > 0.01
      for: 5m
      labels:
        severity: critical
        slo: "error-rate"
      annotations:
        summary: "Error rate above 1% SLO threshold"
    - alert: NodeDown
      expr: up{job="node-exporter"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.instance }} is unreachable"
